name: Backend Deploy - Production (Hybrid Secure)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      deploy_type:
        description: 'Deployment type'
        required: true
        default: 'gradual'
        type: choice
        options:
          - gradual
          - immediate
          - canary

concurrency:
  group: backend-prod-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  security-events: write
  id-token: write
  pull-requests: write

env:
  NODE_VERSION: '22'
  REGION: 'australia-southeast1'
  SERVICE_NAME: 'backend-prod'
  REGISTRY: 'australia-southeast1-docker.pkg.dev'
  IMAGE_REPOSITORY: 'gcf-artifacts'
  GCP_PROJECT_ID: 'carenest-prod'  # Prod project
  CONSOLIDATED_SECRET_NAME: 'app-secrets-prod'
  CLOUD_RUN_SERVICE_ACCOUNT: 'carenest-prod@appspot.gserviceaccount.com'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # Enhanced Security Checks for Production
  security-scan:
    name: Security & Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TRIVY_DB_REPOSITORY: ghcr.io/aquasecurity/trivy-db:2,public.ecr.aws/aquasecurity/trivy-db:2
      TRIVY_JAVA_DB_REPOSITORY: ghcr.io/aquasecurity/trivy-java-db:1,public.ecr.aws/aquasecurity/trivy-java-db:1
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          skip-dirs: 'trivy'
          scanners: 'vuln'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          limit-severities-for-sarif: 'true'
          exit-code: '1'  # Fail on HIGH/CRITICAL vulnerabilities

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-results.sarif') != ''
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run TruffleHog secret scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: .
          extra_args: --only-verified

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=critical

  # Comprehensive Testing for Production
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: security-scan
    defaults:
      run:
        working-directory: .
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        env:
          NODE_ENV: test
        run: npm run test:unit -- --coverage

      - name: Run integration tests
        env:
          NODE_ENV: test
          MONGODB_URI: mongodb://localhost:27017/test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-key
        run: npm run test:integration

      - name: Run E2E tests
        env:
          NODE_ENV: test
          MONGODB_URI: mongodb://localhost:27017/test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-key
        run: npm run test:e2e

  # Build and Push Docker Image
  build:
    name: Build Production Image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [security-scan, test]
    if: github.event_name != 'pull_request' && needs.security-scan.result == 'success' && needs.test.result == 'success'
    outputs:
      image-uri: ${{ steps.set_image_uri.outputs.image-uri }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Authenticate to Google Cloud (Prod)
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.PROD_WIF_PROVIDER }}
          service_account: ${{ secrets.PROD_WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.IMAGE_REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.IMAGE_REPOSITORY }}/${{ env.SERVICE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=production
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.IMAGE_REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          format: spdx-json
          output-file: backend-sbom.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v7
        with:
          name: backend-sbom-prod
          path: backend-sbom.spdx.json

      - name: Scan production image
        uses: aquasecurity/trivy-action@master
        env:
          TRIVY_DB_REPOSITORY: ghcr.io/aquasecurity/trivy-db:2,public.ecr.aws/aquasecurity/trivy-db:2
          TRIVY_JAVA_DB_REPOSITORY: ghcr.io/aquasecurity/trivy-java-db:1,public.ecr.aws/aquasecurity/trivy-java-db:1
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.IMAGE_REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          scanners: 'vuln'
          format: 'sarif'
          output: 'trivy-image-results.sarif'
          severity: 'CRITICAL,HIGH'
          limit-severities-for-sarif: 'true'
          exit-code: '1'  # Block on HIGH/CRITICAL vulnerabilities

      - name: Set image URI output
        id: set_image_uri
        run: |
          IMAGE_URI="${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.IMAGE_REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          echo "image-uri=$IMAGE_URI" >> $GITHUB_OUTPUT

  # Manual Approval Gate
  approval:
    name: Production Approval
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    environment:
      name: production-approval
    steps:
      - name: Approval checkpoint
        run: |
          echo "::notice::Production deployment approved for image ${{ needs.build.outputs.image-uri }}"

  # Deploy to Cloud Run Production
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [build, approval]
    if: github.event_name != 'pull_request'
    environment:
      name: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Authenticate to Google Cloud (Prod)
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.PROD_WIF_PROVIDER }}
          service_account: ${{ secrets.PROD_WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Check whether Cloud Run service already exists
        id: service_check
        run: |
          if gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --project ${{ env.GCP_PROJECT_ID }} >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "::notice::Existing Cloud Run service found"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "::notice::Cloud Run service does not exist yet; deploying as first production release"
          fi

      - name: Deploy to Cloud Run
        id: deploy
        run: |
          IMAGE_URI="${{ needs.build.outputs.image-uri }}"
          TRAFFIC_TAG="prod-${GITHUB_SHA::7}"

          if [ "${{ steps.service_check.outputs.exists }}" = "true" ]; then
            gcloud run deploy ${{ env.SERVICE_NAME }} \
              --image "$IMAGE_URI" \
              --region ${{ env.REGION }} \
              --platform managed \
              --allow-unauthenticated \
              --service-account "${{ env.CLOUD_RUN_SERVICE_ACCOUNT }}" \
              --min-instances 0 \
              --max-instances 10 \
              --cpu 1 \
              --memory 512Mi \
              --timeout 300 \
              --cpu-boost \
              --port 8080 \
              --set-env-vars "NODE_ENV=production,APP_CHECK_ENFORCEMENT=true" \
              --set-env-vars "GCP_PROJECT_ID=carenest-prod,REGION=${{ env.REGION }},VOICE_AGENT_MODEL=gemini-2.5-flash" \
              --set-env-vars "CONSOLIDATED_SECRET_NAME=${{ env.CONSOLIDATED_SECRET_NAME }}" \
              --no-traffic \
              --tag "$TRAFFIC_TAG" \
              --quiet
          else
            gcloud run deploy ${{ env.SERVICE_NAME }} \
              --image "$IMAGE_URI" \
              --region ${{ env.REGION }} \
              --platform managed \
              --allow-unauthenticated \
              --service-account "${{ env.CLOUD_RUN_SERVICE_ACCOUNT }}" \
              --min-instances 0 \
              --max-instances 10 \
              --cpu 1 \
              --memory 512Mi \
              --timeout 300 \
              --cpu-boost \
              --port 8080 \
              --set-env-vars "NODE_ENV=production,APP_CHECK_ENFORCEMENT=true" \
              --set-env-vars "GCP_PROJECT_ID=carenest-prod,REGION=${{ env.REGION }},VOICE_AGENT_MODEL=gemini-2.5-flash" \
              --set-env-vars "CONSOLIDATED_SECRET_NAME=${{ env.CONSOLIDATED_SECRET_NAME }}" \
              --tag "$TRAFFIC_TAG" \
              --quiet
          fi
          
          # DO NOT capture or output URL for security
          echo "traffic-tag=$TRAFFIC_TAG" >> $GITHUB_OUTPUT
          echo "deployment-status=success" >> $GITHUB_OUTPUT
          echo "::notice::Production deployment completed successfully (URL hidden for security)"

      - name: Run smoke tests
        run: |
          set -euo pipefail

          TAGGED_URL="$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --project ${{ env.GCP_PROJECT_ID }} \
            --format=json | jq -r --arg TAG "${{ steps.deploy.outputs.traffic-tag }}" '.status.traffic[] | select(.tag == $TAG) | .url' | head -n 1)"

          if [[ -z "$TAGGED_URL" || "$TAGGED_URL" == "null" ]]; then
            echo "::error::Could not resolve tagged Cloud Run URL for smoke tests"
            exit 1
          fi

          check_endpoint() {
            local path="$1"
            local label="$2"
            local tmp_file="$3"
            local status=""

            for attempt in 1 2 3 4 5 6; do
              status=$(curl -sS -o "$tmp_file" -w "%{http_code}" "${TAGGED_URL}${path}" || true)
              if [[ "$status" == "200" ]]; then
                echo "::notice::${label} passed on attempt ${attempt}"
                return 0
              fi
              sleep 10
            done

            echo "::error::${label} failed with status ${status}"
            cat "$tmp_file" || true
            return 1
          }

          echo "Testing tagged revision API health endpoint..."
          check_endpoint "/api/health" "Smoke test /api/health" /tmp/api_health.out

          echo "::notice::All smoke tests passed against the tagged revision!"

      - name: Gradual traffic rollout
        run: |
          if [ "${{ steps.service_check.outputs.exists }}" != "true" ]; then
            echo "::notice::Skipping traffic rollout because this is the first Cloud Run deployment and the service was created on the latest revision."
            exit 0
          fi

          DEPLOY_TYPE="${{ github.event.inputs.deploy_type || 'gradual' }}"
          
          echo "Starting $DEPLOY_TYPE deployment..."
          
          if [ "$DEPLOY_TYPE" = "immediate" ]; then
            # Immediate 100% rollout (emergency only)
            gcloud run services update-traffic ${{ env.SERVICE_NAME }} \
              --region ${{ env.REGION }} \
              --to-latest
            echo "::notice::Traffic immediately migrated to 100%"
            
          elif [ "$DEPLOY_TYPE" = "canary" ]; then
            # Canary: 10% for 10 minutes, then 100%
            gcloud run services update-traffic ${{ env.SERVICE_NAME }} \
              --region ${{ env.REGION }} \
              --to-revisions=LATEST=10
            echo "::notice::Canary deployed at 10% - monitoring for 10 minutes"
            sleep 600
            
            gcloud run services update-traffic ${{ env.SERVICE_NAME }} \
              --region ${{ env.REGION }} \
              --to-latest
            echo "::notice::Traffic fully migrated to new version"
            
          else
            # Gradual: 25% -> 50% -> 75% -> 100%
            gcloud run services update-traffic ${{ env.SERVICE_NAME }} \
              --region ${{ env.REGION }} \
              --to-revisions=LATEST=25
            echo "::notice::Traffic at 25% - monitoring for 5 minutes"
            sleep 300
            
            gcloud run services update-traffic ${{ env.SERVICE_NAME }} \
              --region ${{ env.REGION }} \
              --to-revisions=LATEST=50
            echo "::notice::Traffic at 50% - monitoring for 5 minutes"
            sleep 300
            
            gcloud run services update-traffic ${{ env.SERVICE_NAME }} \
              --region ${{ env.REGION }} \
              --to-revisions=LATEST=75
            echo "::notice::Traffic at 75% - monitoring for 5 minutes"
            sleep 300
            
            gcloud run services update-traffic ${{ env.SERVICE_NAME }} \
              --region ${{ env.REGION }} \
              --to-latest
            echo "::notice::Traffic fully migrated to new version"
          fi

      - name: Post-deployment validation
        run: |
          set -euo pipefail

          SERVICE_URL="$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --project ${{ env.GCP_PROJECT_ID }} \
            --format='value(status.url)')"

          if [[ -z "$SERVICE_URL" ]]; then
            echo "::error::Could not resolve Cloud Run service URL for post-deployment validation"
            exit 1
          fi

          check_endpoint() {
            local path="$1"
            local label="$2"
            local tmp_file="$3"
            local status=""

            for attempt in 1 2 3 4 5 6; do
              status=$(curl -sS -o "$tmp_file" -w "%{http_code}" "${SERVICE_URL}${path}" || true)
              if [[ "$status" == "200" ]]; then
                echo "::notice::${label} passed on attempt ${attempt}"
                return 0
              fi
              sleep 10
            done

            echo "::error::${label} failed with status ${status}"
            cat "$tmp_file" || true
            return 1
          }

          echo "Running post-deployment validation..."
          check_endpoint "/api/health" "Post-deployment /api/health" /tmp/post_api_health.out

          echo "::notice::✅ Production deployment validated successfully!"

      - name: Create deployment summary
        if: always()
        run: |
          cat >> $GITHUB_STEP_SUMMARY <<EOF
          ## 🚀 Production Deployment Summary
          
          **Status:** ${{ job.status }}
          **Environment:** Production
          **GCP Project:** ${{ env.GCP_PROJECT_ID }}
          **Service:** ${{ env.SERVICE_NAME }}
          **Region:** ${{ env.REGION }}
          **Image:** \`${{ needs.build.outputs.image-uri }}\`
          **Commit:** ${{ github.sha }}
          **Deployment Type:** ${{ github.event.inputs.deploy_type || 'gradual' }}
          **Deployed by:** ${{ github.actor }}
          **Timestamp:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          
          ⚠️ **Backend URL is confidential and not displayed for security**
          
          ### Security Features
          - ✅ Manual approval required
          - ✅ Workload Identity Federation (keyless)
          - ✅ Sensitive secrets in Secret Manager
          - ✅ Security gates (blocks on CRITICAL vulns)
          - ✅ Comprehensive testing (unit + integration + e2e)
          - ✅ Gradual traffic rollout
          - ✅ Post-deployment validation
          - ✅ SBOM generated
          - ✅ URL hidden from logs and summaries
          
          ### Access Backend
          - Use Firebase Auth tokens for API calls
          - URL stored securely in Secret Manager
          - Contact DevOps for direct access
          
          ### Monitoring
          - [Cloud Run Logs](https://console.cloud.google.com/run/detail/${{ env.REGION }}/${{ env.SERVICE_NAME }}/logs?project=${{ env.GCP_PROJECT_ID }})
          - [Cloud Run Metrics](https://console.cloud.google.com/run/detail/${{ env.REGION }}/${{ env.SERVICE_NAME }}/metrics?project=${{ env.GCP_PROJECT_ID }})
          
          ### Rollback Command
          If needed, rollback with:
          \`\`\`bash
          gcloud run services update-traffic ${{ env.SERVICE_NAME }} \\
            --region ${{ env.REGION }} \\
            --to-revisions=PREVIOUS_REVISION=100
          \`\`\`
          EOF

      - name: Create GitHub release
        if: success()
        run: |
          gh release create "v${{ github.run_number }}" \
            --title "Production Release v${{ github.run_number }}" \
            --notes "Deployed commit ${{ github.sha }} to production
            
            **Image:** \`${{ needs.build.outputs.image-uri }}\`
            **Service:** ${{ env.SERVICE_NAME }}
            **Region:** ${{ env.REGION }}
            **Deployment Type:** ${{ github.event.inputs.deploy_type || 'gradual' }}
            
            ⚠️ Backend URL is confidential and not included for security"
        env:
          GH_TOKEN: ${{ github.token }}
