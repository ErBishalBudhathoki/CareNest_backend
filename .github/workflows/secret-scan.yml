name: Secret Scanning

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  trufflehog:
    name: TruffleHog Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified

  gitleaks:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          args: >-
            --no-git
            --redact
            --exclude-path=docs
            --exclude-path=.backup
            --exclude-path=.env.production
            --exclude-path=.env.development
            --exclude-path=ios/Podfile.lock
            --exclude-path=FIREBASE_ADMIN_SDK_GUIDE.md
            --exclude-path=reset_rate_limits.js
            --exclude-path=check_test_user.js
            --exclude-path=update_test_user.js
            --exclude-path=test_login.js
            --exclude-path=test_password_verification.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
